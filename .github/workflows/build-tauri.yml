name: Build Tauri App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2 \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Set app version
        run: |
          node -e 'const fs = require("fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); pkg.version = `0.1.${process.env.GITHUB_RUN_NUMBER}`; fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");'

      - name: Build with Tauri (PR)
        if: github.event_name == 'pull_request'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: .
          args: --bundles appimage,deb

      - name: Build and release (Linux)
        if: github.event_name != 'pull_request'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --bundles appimage,deb
          tagName: app-v0.1.${{ github.run_number }}
          releaseName: "App v0.1.${{ github.run_number }}"
          releaseBody: "Automated release generated by GitHub Actions."
          releaseDraft: false
          prerelease: false

  tauri-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Set app version
        run: |
          node -e 'const fs = require("fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); pkg.version = `0.1.${process.env.GITHUB_RUN_NUMBER}`; fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Tauri (PR)
        if: github.event_name == 'pull_request'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: .
          args: --bundles msi

      - name: Build and release (Windows)
        if: github.event_name != 'pull_request'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --bundles msi
          tagName: app-v0.1.${{ github.run_number }}
          releaseName: "App v0.1.${{ github.run_number }}"
          releaseBody: "Automated release generated by GitHub Actions."
          releaseDraft: false
          prerelease: false
  
  aur-update:
    needs: tauri-linux
    runs-on: ubuntu-latest
    container: archlinux:latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed git openssh curl base-devel

      - name: Setup SSH
        run: |
          set -e

          export HOME=/github/home
          mkdir -p "$HOME/.ssh"

          # Write private key
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY_B64 }}" | base64 -d > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          # Known hosts (STRICT + deterministic)
          ssh-keyscan -t ed25519 aur.archlinux.org > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

          # SSH config (this is the missing piece)
          cat > "$HOME/.ssh/config" <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/id_ed25519
            User aur
            StrictHostKeyChecking yes
          EOF

          chmod 600 "$HOME/.ssh/config"
          
      - name: Debug SSH
        run: |
          ssh -vT aur@aur.archlinux.org || true

      - name: Clone AUR repo
        run: |
          git clone ssh://aur@aur.archlinux.org/wuwa-moma-bin.git aur
          cd aur
          git config user.name "AymanLyesri"
          git config user.email "your@email.com"

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#app-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download AppImage
        run: |
          curl -fL -o app.AppImage \
            "https://github.com/AymanLyesri/wuwa-mod-manager/releases/download/${{ steps.version.outputs.tag }}/WuwaMoMa_${{ steps.version.outputs.version }}_amd64.AppImage"

      - name: Generate checksum
        id: sha
        run: |
          SHA=$(sha256sum app.AppImage | cut -d ' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD
        run: |
          cd aur

          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          sed -i "s|source=.*|source=(\"wuwa-moma-bin-${{ steps.version.outputs.version }}.AppImage::https://github.com/AymanLyesri/wuwa-mod-manager/releases/download/${{ steps.version.outputs.tag }}/WuwaMoMa_${{ steps.version.outputs.version }}_amd64.AppImage\")|" PKGBUILD

          sed -i "s|sha256sums=.*|sha256sums=('${{ steps.sha.outputs.sha }}')|" PKGBUILD

      - name: Create build user
        run: |
          useradd -m builder
          passwd -d builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder aur

      - name: Generate .SRCINFO
        run: |
          sudo -u builder bash -c "cd aur && makepkg --printsrcinfo > .SRCINFO"

      - name: Commit & push if changed
        run: |
          cd aur
          git add PKGBUILD .SRCINFO

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update to ${{ steps.version.outputs.version }}"
            git push
          fi
name: Build Tauri App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri-linux:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/tauri-apps/tauri:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build with Tauri Action (PR)
        if: github.event_name == 'pull_request'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: .
          args: --bundles appimage,deb

      - name: Build and release (Linux)
        if: github.event_name != 'pull_request'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --bundles appimage,deb
          tagName: app-v${{ github.run_number }}
          releaseName: "App v${{ github.run_number }}"
          releaseBody: "Automated release generated by GitHub Actions."
          releaseDraft: false
          prerelease: false

  tauri-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Tauri Action (PR)
        if: github.event_name == 'pull_request'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: .
          args: --bundles msi

      - name: Build and release (Windows)
        if: github.event_name != 'pull_request'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --bundles msi
          tagName: app-v${{ github.run_number }}
          releaseName: "App v${{ github.run_number }}"
          releaseBody: "Automated release generated by GitHub Actions."
          releaseDraft: false
          prerelease: false
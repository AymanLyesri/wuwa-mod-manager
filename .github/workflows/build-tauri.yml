name: Build Tauri App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2 \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Set app version
        run: |
          node -e 'const fs = require("fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); pkg.version = `0.1.${process.env.GITHUB_RUN_NUMBER}`; fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");'

      - name: Build with Tauri (PR)
        if: github.event_name == 'pull_request'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: .
          args: --bundles appimage,deb

      - name: Build and release (Linux)
        if: github.event_name != 'pull_request'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --bundles appimage,deb
          tagName: app-v0.1.${{ github.run_number }}
          releaseName: "App v0.1.${{ github.run_number }}"
          releaseBody: "Automated release generated by GitHub Actions."
          releaseDraft: false
          prerelease: false

  tauri-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Set app version
        run: |
          node -e 'const fs = require("fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); pkg.version = `0.1.${process.env.GITHUB_RUN_NUMBER}`; fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Tauri (PR)
        if: github.event_name == 'pull_request'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: .
          args: --bundles msi

      - name: Build and release (Windows)
        if: github.event_name != 'pull_request'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --bundles msi
          tagName: app-v0.1.${{ github.run_number }}
          releaseName: "App v0.1.${{ github.run_number }}"
          releaseBody: "Automated release generated by GitHub Actions."
          releaseDraft: false
          prerelease: false